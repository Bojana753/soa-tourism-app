<div style="min-height:100vh; background:linear-gradient(135deg, #11998e 0%, #38ef7d 100%); display:flex; align-items:center; justify-content:center">
  <div style="background:white; padding:40px; border-radius:16px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <div style="text-align:center; margin-bottom:30px">
      <div style="font-size:48px">✈️</div>
      <h2 style="font-size:28px; margin-top:10px">Create Account</h2>
      <p style="color:#888; margin-top:4px">Join TourismApp today</p>
    </div>
    <div *ngIf="error" style="background:#fee; border:1px solid #fcc; color:#c00; padding:10px 14px; border-radius:6px; margin-bottom:16px; font-size:14px">
      {{ error }}
    </div>
    <label>Username</label>
    <input [(ngModel)]="username" placeholder="Choose a username">
    <label>Email</label>
    <input [(ngModel)]="email" placeholder="Enter your email">
    <label>Password</label>
    <input type="password" [(ngModel)]="password" placeholder="Choose a password">
    <label>Role</label>
    <select [(ngModel)]="role">
      <option value="tourist">🧳 Tourist</option>
      <option value="guide">🗺️ Guide</option>
    </select>
    <button (click)="register()" style="width:100%; background:linear-gradient(135deg, #11998e, #38ef7d); color:white; margin-top:8px; padding:12px">
      Register
    </button>
    <p style="text-align:center; margin-top:16px; color:#888; font-size:14px">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
