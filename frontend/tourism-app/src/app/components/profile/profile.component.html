<div class="profile-page">

  <nav class="top-nav">
    <a routerLink="/" class="logo">✈ Traavellio</a>
    <div class="nav-links">
      <a routerLink="/login" class="nav-logout">Logout →</a>
    </div>
  </nav>

  <div class="profile-wrapper">

    <div *ngIf="message" class="toast">✓ {{ message }}</div>

    <!-- VIEW MODE -->
    <div *ngIf="!editing" class="profile-layout">
      <div class="profile-sidebar">
        <div class="avatar-wrap">
          <img *ngIf="user.imageUrl" [src]="user.imageUrl" class="avatar-img" />
          <div *ngIf="!user.imageUrl" class="avatar-placeholder">
            {{ user.username?.charAt(0)?.toUpperCase() }}
          </div>
        </div>
        <div class="sidebar-name">{{ user.username }}</div>
        <div class="sidebar-role">{{ user.role }}</div>
        <button (click)="editing=true" class="btn-edit">Edit Profile →</button>
      </div>

      <div class="profile-details">
        <div class="section-label">TRAVELER PROFILE</div>
        <h2 class="section-title">{{ user.firstName }} {{ user.lastName }}</h2>

        <div class="detail-row">
          <span class="detail-key">Email</span>
          <span class="detail-val">{{ user.email }}</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Bio</span>
          <span class="detail-val">{{ user.bio || '—' }}</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Motto</span>
          <span class="detail-val motto">"{{ user.motto || '—' }}"</span>
        </div>
      </div>
    </div>

    <!-- EDIT MODE -->
    <div *ngIf="editing" class="edit-card">
      <div class="card-label">EDIT PROFILE</div>
      <h2 class="edit-title">Update your <span>details</span></h2>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input [(ngModel)]="user.firstName" placeholder="Your first name" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input [(ngModel)]="user.lastName" placeholder="Your last name" />
        </div>
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea [(ngModel)]="user.bio" placeholder="Tell us about yourself" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label>Motto</label>
        <input [(ngModel)]="user.motto" placeholder="Your personal motto" />
      </div>

      <div class="form-group">
        <label>Profile Image URL</label>
        <input [(ngModel)]="user.imageUrl" placeholder="https://..." />
      </div>

      <div class="edit-actions">
        <button (click)="save()" class="btn-save">Save Changes →</button>
        <button (click)="editing=false" class="btn-cancel">Cancel</button>
      </div>
    </div>

  </div>
</div>
