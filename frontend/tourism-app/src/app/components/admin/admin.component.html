<div style="min-height:100vh; background:#f0f4f8">
  <nav style="background:linear-gradient(135deg, #667eea, #764ba2); padding:16px 32px; display:flex; justify-content:space-between; align-items:center">
    <span style="color:white; font-size:20px; font-weight:700">🗺️ TourismApp — Admin</span>
    <a routerLink="/login" style="color:white; font-size:14px">Logout</a>
  </nav>

  <div style="max-width:900px; margin:40px auto; padding:0 16px">
    <div style="background:white; border-radius:16px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,0.08)">
      <h2 style="margin-bottom:24px">👥 Users</h2>
      <table style="width:100%; border-collapse:collapse">
        <thead>
          <tr style="background:#f8f9fa">
            <th style="padding:14px 16px; text-align:left; font-size:13px; color:#888; font-weight:600; border-bottom:2px solid #f0f0f0">USERNAME</th>
            <th style="padding:14px 16px; text-align:left; font-size:13px; color:#888; font-weight:600; border-bottom:2px solid #f0f0f0">EMAIL</th>
            <th style="padding:14px 16px; text-align:left; font-size:13px; color:#888; font-weight:600; border-bottom:2px solid #f0f0f0">ROLE</th>
            <th style="padding:14px 16px; text-align:left; font-size:13px; color:#888; font-weight:600; border-bottom:2px solid #f0f0f0">STATUS</th>
            <th style="padding:14px 16px; text-align:left; font-size:13px; color:#888; font-weight:600; border-bottom:2px solid #f0f0f0">ACTION</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users" style="border-bottom:1px solid #f5f5f5">
            <td style="padding:14px 16px; font-weight:500">{{ user.username }}</td>
            <td style="padding:14px 16px; color:#666">{{ user.email }}</td>
            <td style="padding:14px 16px">
              <span [style.background]="user.role === 'admin' ? '#fef3cd' : '#e8f4fd'"
                    [style.color]="user.role === 'admin' ? '#856404' : '#3498db'"
                    style="padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600">
                {{ user.role }}
              </span>
            </td>
            <td style="padding:14px 16px">
              <span [style.background]="user.isBlocked ? '#fde8e8' : '#e8fdf0'"
                    [style.color]="user.isBlocked ? '#e53e3e' : '#27ae60'"
                    style="padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600">
                {{ user.isBlocked ? 'Blocked' : 'Active' }}
              </span>
            </td>
            <td style="padding:14px 16px">
              <button *ngIf="!user.isBlocked && user.role !== 'admin'" (click)="block(user.ID)"
                style="background:#e53e3e; color:white; padding:6px 14px; font-size:13px">
                Block
              </button>
              <span *ngIf="user.isBlocked" style="color:#aaa; font-size:13px">—</span>
              <span *ngIf="user.role === 'admin'" style="color:#aaa; font-size:13px">—</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
