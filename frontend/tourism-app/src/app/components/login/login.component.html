<div style="min-height:100vh; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); display:flex; align-items:center; justify-content:center">
  <div style="background:white; padding:40px; border-radius:16px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <div style="text-align:center; margin-bottom:30px">
      <div style="font-size:48px">🗺️</div>
      <h2 style="font-size:28px; margin-top:10px">TourismApp</h2>
      <p style="color:#888; margin-top:4px">Welcome back!</p>
    </div>
    <div *ngIf="error" style="background:#fee; border:1px solid #fcc; color:#c00; padding:10px 14px; border-radius:6px; margin-bottom:16px; font-size:14px">
      {{ error }}
    </div>
    <label>Username</label>
    <input [(ngModel)]="username" placeholder="Enter your username">
    <label>Password</label>
    <input type="password" [(ngModel)]="password" placeholder="Enter your password">
    <button (click)="login()" style="width:100%; background:linear-gradient(135deg, #667eea, #764ba2); color:white; margin-top:8px; padding:12px">
      Login
    </button>
    <p style="text-align:center; margin-top:16px; color:#888; font-size:14px">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
