version: "3.8"

services:
  stakeholders-service:
    build: ./stakeholders-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=stakeholders-db
    depends_on:
      - stakeholders-db

  stakeholders-db:
    image: postgres:15
    environment:
      POSTGRES_DB: stakeholders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"

  blog-mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - blog_mongo_data:/data/db

  blog-service:
    build: ./blog-service
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: mongodb://blog-mongodb:27017/blogdb
    depends_on:
      - blog-mongodb

volumes:
  blog_mongo_data:

networks:
  default:
    name: soa-network
